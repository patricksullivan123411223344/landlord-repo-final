<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Landlord Rating</title>
        <link rel="stylesheet" href="/css/index.css">
    </head>
    <body>
        <main class="card">
            <h1>Landlord Rating</h1>
            <p class="subtitle">Find affordable housing & landlord ratings in Providence, RI</p>
            <div class="button-grid">
                <a href="/rating" class="btn btn-primary">Get Rating</a>
                <a href="/fair-rent" class="btn btn-secondary">Tenant Board</a>
            </div>
        </main>
        <div id="server-required" class="server-notice">
            <strong>Run the server first.</strong> From the project folder: <code>uvicorn python.main:app --reload</code><br>
            Then open <a href="http://127.0.0.1:8000/">http://127.0.0.1:8000/</a>
        </div>
        <script>
            if (window.location.protocol === 'file:') {
                document.getElementById('server-required').style.display = 'block';
            }
        </script>
    </body>
</html>
