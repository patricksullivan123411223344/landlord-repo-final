<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Landlord Rating</title>
        <link rel="stylesheet" href="/css/index.css">
    </head>
    <body>
        <h1>Landlord Rating</h1>
        <p style="margin-bottom:1rem;color:#6a6560;">Find affordable housing & landlord ratings in Providence, RI</p>

        <div id="server-required" style="display:none;margin-top:2rem;padding:1rem;background:#fdf3ea;border:1px solid #f5c49a;border-radius:6px;font-size:0.9rem;max-width:400px;">
            <strong>Run the server first.</strong> From the project folder: <code>uvicorn python.main:app --reload</code><br>

        <script>
