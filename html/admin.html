<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Manage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .box { background: #252525; border: 1px solid #333; border-radius: 8px; padding: 2rem; max-width: 360px; width: 100%; }
    h1 { font-size: 1rem; font-weight: 600; margin-bottom: 1.5rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 0.25rem; }
    .field input { width: 100%; padding: 0.5rem 0.75rem; background: #1a1a1a; border: 1px solid #444; border-radius: 4px; color: #e0e0e0; font-size: 0.9rem; }
    .field input:focus { outline: none; border-color: #555; }
    .btn { width: 100%; padding: 0.6rem; font-size: 0.9rem; font-weight: 600; border: none; border-radius: 4px; cursor: pointer; margin-top: 0.5rem; }
    .btn-primary { background: #2d6a4f; color: #fff; }
    .btn-primary:hover { background: #245a42; }
    .btn-secondary { background: transparent; color: #888; margin-top: 0.25rem; }
    .btn-secondary:hover { color: #ccc; }
    .msg { font-size: 0.85rem; margin-top: 1rem; padding: 0.5rem; border-radius: 4px; }
    .msg.err { background: rgba(200,80,80,0.2); color: #e88; }
    .msg.ok { background: rgba(80,200,80,0.2); color: #8e8; }
    .admin-panel { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #333; }
    .admin-panel p { font-size: 0.85rem; color: #888; }
    #no-config { color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Manage</h1>
    <div id="no-config" style="display:none;">Supabase not configured. Add SUPABASE_URL and SUPABASE_ANON_KEY to .env.</div>
    <div id="auth-form" style="display:none;">
      <div class="field">
        <label>Email</label>
        <input type="email" id="admin-email" placeholder="admin@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="admin-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn btn-primary" id="btn-signin">Sign in</button>
      <div id="auth-msg" class="msg" style="display:none;"></div>
    </div>
    <div id="admin-panel" style="display:none;">
      <p>Signed in as <span id="admin-email-display"></span></p>
      <button class="btn btn-secondary" id="btn-signout">Sign out</button>
      <div class="admin-panel">
        <p>Admin panel ready. Add moderation features here.</p>
      </div>
    </div>
    <div id="access-denied" style="display:none;">
      <p class="msg err">Access denied. Your email is not in the admin list.</p>
      <button class="btn btn-secondary" id="btn-denied-signout">Sign out</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/auth.js"></script>
  <script>
    (function() {
      var Auth = window.BoardAuth;
      var $ = function(id) { return document.getElementById(id); };

      async function init() {
        var cfgRes = await fetch("/api/board-config");
        var cfg = await cfgRes.json();
        if (!cfg.supabaseUrl || !cfg.supabaseAnonKey || !window.supabase) {
          $("no-config").style.display = "block";
          return;
        }
        var client = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
        Auth.init(client);

        var session = await Auth.getSession();
        if (session) {
          var isAdmin = await Auth.isAdmin();
          if (isAdmin) {
            $("admin-panel").style.display = "block";
            $("admin-email-display").textContent = session.user.email;
          } else {
            $("access-denied").style.display = "block";
          }
        } else {
          $("auth-form").style.display = "block";
        }

        $("btn-signin").onclick = async function() {
          var email = $("admin-email").value.trim();
          var password = $("admin-password").value;
          var msg = $("auth-msg");
          if (!email || !password) {
            msg.textContent = "Enter email and password.";
            msg.className = "msg err";
            msg.style.display = "block";
            return;
          }
          $("btn-signin").disabled = true;
          var r = await Auth.signIn(email, password);
          $("btn-signin").disabled = false;
          if (r.error) {
            msg.textContent = r.error?.message || String(r.error);
            msg.className = "msg err";
            msg.style.display = "block";
            return;
          }
          var isAdmin = await Auth.isAdmin();
          if (isAdmin) {
            msg.style.display = "none";
            $("auth-form").style.display = "none";
            $("admin-panel").style.display = "block";
            $("admin-email-display").textContent = r.data.user.email;
          } else {
            msg.textContent = "Access denied. Your email is not in the admin list.";
            msg.className = "msg err";
            msg.style.display = "block";
            await Auth.signOut();
          }
        };

        $("btn-signout").onclick = function() {
          Auth.signOut();
          location.reload();
        };

        $("btn-denied-signout").onclick = function() {
          Auth.signOut();
          location.reload();
        };
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
